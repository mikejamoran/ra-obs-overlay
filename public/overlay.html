<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RA Overlay</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: var(--font-family, "Segoe UI", system-ui, sans-serif);
  font-size: var(--font-size, 13px);
  color: var(--text-color, #e6edf3);
}

#canvas { position: absolute; inset: 0; }

/* ── Achievement widget positioning ─────────────────────────────────────────── */
#ach-widget {
  position: absolute;
  cursor: grab;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
#ach-widget.locked { cursor: default; }
#ach-widget.pos-top-left     { top: 16px; left: 16px; }
#ach-widget.pos-top-center   { top: 16px; left: 50%; transform: translateX(-50%); }
#ach-widget.pos-top-right    { top: 16px; right: 16px; }
#ach-widget.pos-center-left  { top: 50%; left: 16px; transform: translateY(-50%); }
#ach-widget.pos-center       { top: 50%; left: 50%; transform: translate(-50%,-50%); }
#ach-widget.pos-center-right { top: 50%; right: 16px; transform: translateY(-50%); }
#ach-widget.pos-bottom-left  { bottom: 16px; left: 16px; }
#ach-widget.pos-bottom-center{ bottom: 16px; left: 50%; transform: translateX(-50%); }
#ach-widget.pos-bottom-right { bottom: 16px; right: 16px; }

/* ── Achievement panel ───────────────────────────────────────────────────────── */
#panel {
  width: var(--panel-width, 440px);
  max-height: var(--panel-h, 600px);
  display: flex;
  flex-direction: column;
}
#panel-header {
  background: rgba(0,0,0,0.6);
  border-radius: var(--tile-radius) var(--tile-radius) 0 0;
  border: 1px solid rgba(255,255,255,0.08);
  border-bottom: none;
  padding: 8px 12px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
#game-box-art { width: 36px; height: 36px; border-radius: 4px; object-fit: cover; flex-shrink: 0; display: none; }
#game-title   { font-size: 13px; font-weight: 700; flex: 1; line-height: 1.3; }
#game-progress{ font-size: 11px; color: var(--muted-color); }
#ach-container {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.15) transparent;
  display: flex; flex-direction: column; gap: var(--tile-gap); padding: 4px 0;
}
#ach-container::-webkit-scrollbar { width: 4px; }
#ach-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
.state-msg { color: rgba(255,255,255,0.4); font-size: 13px; text-align: center; padding: 24px 16px; }

/* ── Tile (both mode) ────────────────────────────────────────────────────────── */
.tile {
  background: rgba(var(--bg-rgb,13,13,13), var(--bg-opacity,0.88));
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--tile-radius);
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  cursor: grab; user-select: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative; resize: both; overflow: hidden;
  min-width: 80px; min-height: 40px; flex-shrink: 0;
}
.tile:active { cursor: grabbing; }
.tile:hover  { border-color: rgba(255,255,255,0.18); }
.tile.earned { border-left: 3px solid var(--success-color); opacity: 0.6; }
.tile.pinned { border-color: var(--gold-color) !important; box-shadow: 0 0 12px rgba(227,179,65,0.25), inset 0 0 0 1px rgba(227,179,65,0.1); opacity: 1 !important; }
.tile.sortable-ghost  { opacity: 0.3; }
.tile.sortable-chosen { box-shadow: 0 4px 20px rgba(0,0,0,0.6); z-index: 10; }
.tile-badge { flex-shrink: 0; position: relative; width: var(--badge-size); height: var(--badge-size); }
.tile-badge img { width: 100%; height: 100%; border-radius: 6px; object-fit: cover; display: block; }
.tile-badge img.locked { filter: grayscale(1) opacity(0.5); }
.badge-earned { position: absolute; bottom: -4px; right: -4px; width: 16px; height: 16px; background: var(--success-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #fff; font-weight: 700; border: 1.5px solid rgba(0,0,0,0.4); }
.tile-content { flex: 1; min-width: 0; }
.tile-header  { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.tile-name    { font-size: var(--font-size); font-weight: 700; line-height: 1.3; color: var(--text-color); flex: 1; min-width: 0; }
.tile-points  { flex-shrink: 0; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 2px 8px; color: var(--muted-color); white-space: nowrap; }
.tile.pinned .tile-points { background: rgba(227,179,65,0.15); border-color: var(--gold-color); color: var(--gold-color); }
.tile.earned .tile-points { background: rgba(63,185,80,0.12); border-color: var(--success-color); color: var(--success-color); }
.tile-desc    { font-size: calc(var(--font-size) - 1px); color: var(--muted-color); line-height: 1.4; margin-top: 3px; }
.progress-wrap  { margin-top: 6px; }
.progress-bar   { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.progress-fill  { height: 100%; background: var(--accent-color); border-radius: 3px; transition: width 0.5s ease; }
.tile.pinned .progress-fill { background: var(--gold-color); }
.progress-label { font-size: 10px; color: var(--muted-color); margin-top: 3px; text-align: right; }
.tile-date  { font-size: 10px; color: var(--muted-color); margin-top: 3px; }
.dismiss-btn { position: absolute; top: 4px; right: 6px; font-size: 14px; line-height: 1; color: rgba(255,255,255,0.25); cursor: pointer; background: none; border: none; padding: 2px 4px; border-radius: 3px; }
.dismiss-btn:hover { color: rgba(255,255,255,0.6); }

/* Size classes */
.tile.sz-xs { flex-direction: column; align-items: stretch; justify-content: center; padding: 4px; gap: 0; }
.tile.sz-xs .tile-content { display: none; }
.tile.sz-xs .tile-badge { flex: 1; width: 100%; height: 100%; }
.tile.sz-xs .tile-badge img { width: 100%; height: 100%; object-fit: contain; border-radius: 4px; }
.tile.sz-sm { flex-direction: column; align-items: center; text-align: center; padding: 8px 6px; gap: 5px; }
.tile.sz-sm .tile-content { width: 100%; }
.tile.sz-sm .tile-header  { justify-content: center; }
.tile.sz-sm .tile-name    { font-size: 10px; font-weight: 600; line-height: 1.2; }
.tile.sz-sm .tile-points, .tile.sz-sm .tile-desc, .tile.sz-sm .tile-date, .tile.sz-sm .progress-wrap { display: none; }
.tile.sz-md .tile-desc, .tile.sz-md .tile-date, .tile.sz-md .progress-wrap { display: none; }
.tile.sz-lg .tile-date, .tile.sz-lg .progress-wrap { display: none; }

/* Tiles mode */
#ach-container.mode-tiles { flex-direction: row; flex-wrap: wrap; align-content: flex-start; }
#ach-container.mode-tiles .tile {
  flex-direction: column; align-items: center; text-align: center;
  width: calc(var(--badge-size) + 24px); padding: 8px; gap: 6px; resize: none; cursor: pointer;
}
#ach-container.mode-tiles .tile.expanded { flex-direction: row; text-align: left; align-items: flex-start; width: auto; min-width: 200px; cursor: grab; resize: both; }
#ach-container.mode-tiles .tile.sz-xs, #ach-container.mode-tiles .tile.sz-sm { flex-direction: column; }
#ach-container.mode-tiles .tile.expanded.sz-xs, #ach-container.mode-tiles .tile.expanded.sz-sm { flex-direction: column; }
.expand-hint { position: absolute; bottom: 2px; right: 4px; font-size: 8px; color: rgba(255,255,255,0.2); }

/* Text mode */
.tile-text { display: flex; align-items: center; gap: 8px; padding: 5px 10px; border-radius: 6px; background: rgba(var(--bg-rgb,13,13,13), var(--bg-opacity,0.88)); border-left: 3px solid var(--accent-color); cursor: default; flex-shrink: 0; }
.tile-text.earned { border-left-color: var(--success-color); opacity: 0.55; }
.tile-text.pinned { border-left-color: var(--gold-color); opacity: 1; }
.tile-text-badge { width: 28px; height: 28px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
.tile-text-badge.locked { filter: grayscale(1) opacity(0.5); }
.tile-text-name { font-size: calc(var(--font-size) - 1px); font-weight: 600; flex: 1; color: var(--text-color); }
.tile-text-pts  { font-size: 10px; color: var(--muted-color); flex-shrink: 0; }

/* Recent panel — position: absolute so it lives inside the canvas and is draggable */
#recent-panel {
  position: absolute;
  display: flex; flex-direction: column; gap: var(--tile-gap);
  cursor: grab;
  min-width: 80px; min-height: 36px;
}
#recent-panel.bottom-left  { bottom: 16px; left: 16px; }
#recent-panel.bottom-right { bottom: 16px; right: 16px; }
#recent-panel.top-left     { top: 16px; left: 16px; }
#recent-panel.top-right    { top: 16px; right: 16px; }

/* Stack mode tiles */
.recent-tile { background: rgba(var(--bg-rgb,13,13,13), var(--bg-opacity,0.88)); border: 1px solid rgba(255,255,255,0.08); border-left: 3px solid var(--gold-color); border-radius: var(--tile-radius); padding: 6px 10px; display: flex; align-items: center; gap: 8px; animation: slideIn 0.4s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.recent-badge { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
.recent-title { font-size: 12px; font-weight: 600; flex: 1; }
.recent-pts   { font-size: 10px; color: var(--gold-color); flex-shrink: 0; }
.recent-date  { font-size: 10px; color: var(--muted-color); }

/* Ticker mode */
#recent-panel.mode-ticker {
  overflow: hidden;
  flex-direction: row;
  align-items: center;
  background: rgba(var(--bg-rgb,13,13,13), var(--bg-opacity,0.75));
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--tile-radius);
  padding: 0;
  gap: 0;
}
.recent-ticker-track {
  display: flex;
  align-items: center;
  gap: 28px;
  white-space: nowrap;
  flex-shrink: 0;
  height: 100%;
  padding: 0 14px;
  animation: recent-tick linear infinite;
  animation-duration: var(--ticker-dur, 20s);
}
@keyframes recent-tick {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
.recent-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(var(--bg-rgb,13,13,13), var(--bg-opacity,0.88));
  border-radius: 24px; padding: 5px 14px 5px 6px;
  border: 1px solid rgba(255,255,255,0.1);
  border-left: 3px solid var(--gold-color);
  flex-shrink: 0;
}
.recent-pill-badge { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
.recent-pill-title { font-size: 13px; font-weight: 600; color: var(--text-color); }
.recent-pill-pts   { font-size: 11px; font-weight: 700; color: var(--gold-color); }

/* ── Widget base ─────────────────────────────────────────────────────────────── */
.widget { position: absolute; cursor: grab; }
.widget:active { cursor: grabbing; }
.widget.locked { cursor: default; }

/* ── Widget: box (death counter, timer, countdown) ───────────────────────────── */
.w-box {
  width: 100%; height: 100%;
  background: rgba(var(--w-bg-rgb,13,13,13), var(--w-bg-opacity,0.85));
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px 14px;
}
.w-label { font-size: 13px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
.w-value { font-weight: 700; color: var(--w-color, #e6edf3); line-height: 1; font-variant-numeric: tabular-nums; }

/* ── Widget: social ──────────────────────────────────────────────────────────── */
.w-social {
  width: 100%; height: 100%;
  background: rgba(var(--w-bg-rgb,13,13,13), var(--w-bg-opacity,0.85));
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  overflow: hidden;
}
.w-social-icon { flex-shrink: 0; display: flex; align-items: center; }
.w-social-text { font-weight: 600; color: var(--w-color,#e6edf3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Widget: scrolling text ──────────────────────────────────────────────────── */
.w-scroll-outer { width: 100%; height: 100%; overflow: hidden; display: flex; align-items: center; background: rgba(var(--w-bg-rgb,13,13,13), var(--w-bg-opacity,0)); }
.w-scroll-inner { white-space: nowrap; display: inline-block; padding-left: 100%; animation: w-scroll var(--scroll-dur,20s) linear infinite; }
@keyframes w-scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }

/* ── Widget: chat ────────────────────────────────────────────────────────────── */
.chat-container {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.chat-header {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: rgba(255,255,255,0.4);
  padding: 6px 10px 0; flex-shrink: 0;
}
.chat-list {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  gap: 3px; padding: 8px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.12) transparent;
}
.chat-list::-webkit-scrollbar { width: 3px; }
.chat-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
.chat-msg {
  display: flex; flex-wrap: wrap; align-items: baseline;
  gap: 4px; line-height: 1.5;
  animation: chatIn 0.18s ease;
}
@keyframes chatIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
.chat-badges { display: inline-flex; gap: 3px; align-items: center; flex-shrink: 0; }
.chat-badge {
  font-size: 9px; font-weight: 800; border-radius: 3px;
  padding: 1px 5px; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.4;
}
.chat-badge.broadcaster { background: #e91916; color: #fff; }
.chat-badge.moderator   { background: #00ad03; color: #fff; }
.chat-badge.vip         { background: #e005b9; color: #fff; }
.chat-badge.subscriber  { background: #8205b4; color: #fff; }
.chat-username { font-weight: 700; flex-shrink: 0; cursor: default; }
.chat-colon    { color: rgba(255,255,255,0.3); flex-shrink: 0; }
.chat-text     { word-break: break-word; min-width: 0; }
.chat-time     { font-size: 10px; color: rgba(255,255,255,0.25); flex-shrink: 0; margin-left: auto; padding-left: 6px; }
.chat-empty    { color: rgba(255,255,255,0.25); font-size: 12px; text-align: center; padding: 24px 12px; line-height: 1.6; }

/* ── Widget: image ───────────────────────────────────────────────────────────── */
.w-image { width: 100%; height: 100%; }
.w-image img { width: 100%; height: 100%; display: block; }

/* ── Resize handle ───────────────────────────────────────────────────────────── */
.resize-handle {
  position: absolute;
  bottom: 0; right: 0;
  width: 18px; height: 18px;
  cursor: nwse-resize;
  z-index: 99;
  background: rgba(0,0,0,0.55);
  border-radius: 4px 0 4px 0;
  opacity: 0;
  transition: opacity 0.15s;
}
.resize-handle::after {
  content: '';
  position: absolute;
  bottom: 3px; right: 3px;
  width: 9px; height: 9px;
  border-right: 2px solid rgba(255,255,255,0.9);
  border-bottom: 2px solid rgba(255,255,255,0.9);
  border-radius: 0 0 2px 0;
}
.widget:hover .resize-handle,
#ach-widget:hover .resize-handle { opacity: 1; }

/* ── Ticker ──────────────────────────────────────────────────────────────────── */
#ticker { position: fixed; bottom: 6px; right: 8px; font-size: 10px; color: rgba(255,255,255,0.15); pointer-events: none; }

/* ── Alerts ──────────────────────────────────────────────────────────────────── */
#alert-layer { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
.alert-box { position: absolute; max-width: 80vw; }
.alert-box.pos-top-left     { top: 32px; left: 32px; }
.alert-box.pos-top-center   { top: 32px; left: 50%; transform: translateX(-50%); }
.alert-box.pos-top-right    { top: 32px; right: 32px; }
.alert-box.pos-center-left  { top: 50%; left: 32px; transform: translateY(-50%); }
.alert-box.pos-center       { top: 50%; left: 50%; transform: translate(-50%,-50%); }
.alert-box.pos-center-right { top: 50%; right: 32px; transform: translateY(-50%); }
.alert-box.pos-bottom-left  { bottom: 32px; left: 32px; }
.alert-box.pos-bottom-center{ bottom: 32px; left: 50%; transform: translateX(-50%); }
.alert-box.pos-bottom-right { bottom: 32px; right: 32px; }
/* position lives on .alert-box; animation on .alert-inner so transforms don't clash */
.alert-inner { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.alert-inner img, .alert-inner video { max-width: 80vw; max-height: 80vh; }
.alert-text {
  padding: 10px 20px; border-radius: 10px;
  text-align: center; font-weight: 700; line-height: 1.3;
  max-width: 80vw; overflow-wrap: break-word;
}
/* Shared in/out animations — used by alerts, widgets, and the achievement panel */
.anim-in-fade        { animation: alertFade    0.4s ease both; }
.anim-in-slide-up    { animation: alertSlideUp 0.4s cubic-bezier(0.22,1,0.36,1) both; }
.anim-in-slide-down  { animation: alertSlideDn 0.4s cubic-bezier(0.22,1,0.36,1) both; }
.anim-in-slide-left  { animation: alertSlideL  0.4s cubic-bezier(0.22,1,0.36,1) both; }
.anim-in-slide-right { animation: alertSlideR  0.4s cubic-bezier(0.22,1,0.36,1) both; }
.anim-in-pop         { animation: alertPop     0.45s cubic-bezier(0.34,1.56,0.64,1) both; }
.anim-out-fade        { animation: alertFade    0.4s ease reverse both; }
.anim-out-slide-up    { animation: alertSlideUp 0.4s ease reverse both; }
.anim-out-slide-down  { animation: alertSlideDn 0.4s ease reverse both; }
.anim-out-slide-left  { animation: alertSlideL  0.4s ease reverse both; }
.anim-out-slide-right { animation: alertSlideR  0.4s ease reverse both; }
.anim-out-pop         { animation: alertPop     0.4s ease reverse both; }
@keyframes alertFade    { from { opacity: 0; } to { opacity: 1; } }
@keyframes alertSlideUp { from { opacity: 0; transform: translateY(48px); }  to { opacity: 1; transform: none; } }
@keyframes alertSlideDn { from { opacity: 0; transform: translateY(-48px); } to { opacity: 1; transform: none; } }
@keyframes alertSlideL  { from { opacity: 0; transform: translateX(48px); }  to { opacity: 1; transform: none; } }
@keyframes alertSlideR  { from { opacity: 0; transform: translateX(-48px); } to { opacity: 1; transform: none; } }
@keyframes alertPop     { from { opacity: 0; transform: scale(0.4); }        to { opacity: 1; transform: scale(1); } }

/* Unlock flash — golden pulse on a freshly earned achievement */
.ach-flash { animation: achFlash 0.9s ease-in-out 4; }
@keyframes achFlash {
  0%, 100% { box-shadow: 0 0 0 0 rgba(227,179,65,0); border-color: rgba(255,255,255,0.08); }
  50%      { box-shadow: 0 0 18px 4px rgba(227,179,65,0.85); border-color: var(--gold-color, #e3b341); }
}

/* Rich presence line in the panel header */
#game-rp { font-size: 11px; color: var(--gold-color, #e3b341); margin-top: 2px; line-height: 1.3; }
</style>
</head>
<body>
<div id="canvas"></div>
<div id="alert-layer"></div>
<div id="ticker"></div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
<script>
// ── CSS custom properties ─────────────────────────────────────────────────────

const BADGE_BASE = 'https://media.retroachievements.org/Badge';

function hexToRgb(hex) {
  if (!hex || hex.length < 7) return [13,13,13];
  return [
    parseInt(hex.slice(1,3),16),
    parseInt(hex.slice(3,5),16),
    parseInt(hex.slice(5,7),16),
  ];
}

function applyStyles(d) {
  const root  = document.documentElement;
  const [r,g,b] = hexToRgb(d.bgColor || '#0d0d0d');
  root.style.setProperty('--bg-color',     d.bgColor  || '#0d0d0d');
  root.style.setProperty('--bg-rgb',       `${r},${g},${b}`);
  root.style.setProperty('--bg-opacity',   d.bgOpacity ?? 0.88);
  root.style.setProperty('--text-color',   d.textColor   || '#e6edf3');
  root.style.setProperty('--muted-color',  '#8b949e');
  root.style.setProperty('--accent-color', d.accentColor || '#1f6feb');
  root.style.setProperty('--gold-color',   d.goldColor   || '#e3b341');
  root.style.setProperty('--success-color','#3fb950');
  root.style.setProperty('--font-size',    (d.fontSize || 13) + 'px');
  root.style.setProperty('--font-family',  d.fontFamily || '"Segoe UI", system-ui, sans-serif');
  root.style.setProperty('--badge-size',   (d.badgeSize || 56) + 'px');
  root.style.setProperty('--tile-gap',     (d.tileGap   || 8) + 'px');
  root.style.setProperty('--tile-radius',  (d.tileRadius|| 8) + 'px');
  root.style.setProperty('--panel-width',  (d.panelWidth|| 440) + 'px');
  root.style.setProperty('--panel-h',      (d.panelH    || 600) + 'px');
}

// ── State ─────────────────────────────────────────────────────────────────────

let state = { display: {}, achievements: [], gameInfo: {}, widgets: [], connected: false, richPresence: '' };
let dismissed = new Set();
let achSortable = null;
let resizeObservers = [];

// Freshly unlocked achievement ids → flash until this timestamp
const FLASH_MS = 4000;
let flashIds = new Map();
let firstRender = true;

function elemAnimIn()  { return state.display.elemAnimIn  ?? 'fade'; }
function elemAnimOut() { return state.display.elemAnimOut ?? 'fade'; }

// Apply an entrance animation class (and clean it up so later transforms work)
function animateIn(el) {
  const style = elemAnimIn();
  if (style === 'none') return;
  el.classList.add('anim-in-' + style);
  setTimeout(() => el.classList.remove('anim-in-' + style), 600);
}

// Play the exit animation, then run done() (e.g. hide or remove the element)
function animateOut(el, done) {
  const style = elemAnimOut();
  if (style === 'none' || !el) { done(); return; }
  el.classList.add('anim-out-' + style);
  setTimeout(() => { el.classList.remove('anim-out-' + style); done(); }, 420);
}

// ── WebSocket ─────────────────────────────────────────────────────────────────

let ws, wsReconnect;

function connectWS() {
  clearTimeout(wsReconnect);
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onmessage = e => { try { handleWS(JSON.parse(e.data)); } catch {} };
  ws.onclose   = () => { wsReconnect = setTimeout(connectWS, 3000); };
  ws.onerror   = () => ws.close();
}

function handleWS(msg) {
  if (msg.type === 'state') {
    state = msg;
    renderAll();
    // Resume an alert already on screen (e.g. overlay refreshed mid-alert)
    if (msg.alerts && msg.alerts.playingAlert) playAlert(msg.alerts.playingAlert, true);
    else stopAlert();
  } else if (msg.type === 'alert_play') {
    playAlert(msg.alert);
  } else if (msg.type === 'alert_stop') {
    stopAlert(msg.alertId);
  } else if (msg.type === 'widget_update') {
    const idx = state.widgets.findIndex(w => w.id === msg.widget.id);
    if (idx >= 0) state.widgets[idx] = msg.widget; else state.widgets.push(msg.widget);
    patchWidget(msg.widget);
  } else if (msg.type === 'widget_add') {
    state.widgets.push(msg.widget);
    if (msg.widget.visible) placeWidget(msg.widget, true);
  } else if (msg.type === 'widget_delete') {
    state.widgets = state.widgets.filter(w => w.id !== msg.id);
    const el = document.getElementById('w-' + msg.id);
    if (el) animateOut(el, () => el.remove());
  } else if (msg.type === 'chat_message') {
    appendChatMessage(msg);
  } else if (msg.type === 'achievement_unlocked') {
    // The full achievements broadcast follows; just remember which id to flash
    if (state.display.unlockFlash !== false) {
      flashIds.set(msg.achievement.id, Date.now() + FLASH_MS);
      setTimeout(() => {
        flashIds.delete(msg.achievement.id);
        document.querySelectorAll(`[data-id="${msg.achievement.id}"]`).forEach(el => el.classList.remove('ach-flash'));
      }, FLASH_MS);
    }
  } else if (msg.type === 'rich_presence') {
    state.richPresence = msg.message;
    const rp = document.getElementById('game-rp');
    if (rp) rp.textContent = msg.message;
    else if (msg.message) renderAchPanel();
  } else if (msg.type === 'achievements') {
    if (msg.achievements) state.achievements = msg.achievements;
    if (msg.gameInfo)     state.gameInfo     = msg.gameInfo;
    if (msg.display)      Object.assign(state.display, msg.display);
    applyStyles(state.display);
    renderAchPanel();
  }
}

// ── Render all ────────────────────────────────────────────────────────────────

function renderAll() {
  applyStyles(state.display);
  renderAchPanel();

  // Clear non-achievement widgets
  document.querySelectorAll('.widget').forEach(el => el.remove());

  for (const w of state.widgets) {
    if (w.visible) placeWidget(w, firstRender);
  }
  firstRender = false;
}

// ── Achievement panel ─────────────────────────────────────────────────────────

function renderAchPanel() {
  const d    = state.display || {};
  const achs = state.achievements || [];
  const gi   = state.gameInfo || {};
  const canvas = document.getElementById('canvas');

  let aw = document.getElementById('ach-widget');
  if (!aw) {
    aw = document.createElement('div');
    aw.id = 'ach-widget';
    canvas.insertBefore(aw, canvas.firstChild);
  }

  const wasHidden = aw.style.display === 'none' || !aw.hasChildNodes();
  if (d.panelVisible === false) {
    if (!wasHidden) animateOut(aw.querySelector('#panel'), () => { aw.style.display = 'none'; });
    else aw.style.display = 'none';
    return;
  }
  aw.style.display = '';

  // Position
  if (d.panelX !== null && d.panelX !== undefined) {
    aw.className = d.panelLocked ? 'locked' : '';
    aw.style.left = d.panelX + 'px';
    aw.style.top  = d.panelY + 'px';
    aw.style.transform = '';
    aw.style.right = '';
    aw.style.bottom = '';
  } else {
    aw.className = 'pos-' + (d.panelPos || 'top-right') + (d.panelLocked ? ' locked' : '');
    aw.style.left = ''; aw.style.top = ''; aw.style.right = ''; aw.style.bottom = '';
    aw.style.transform = '';
  }
  aw.style.zIndex = d.panelZIndex || 10;

  if (!d.panelLocked) makeDraggable(aw, '/api/display/position', (x, y) => { state.display.panelX = x; state.display.panelY = y; });

  // Build panel HTML
  aw.innerHTML = '';
  const panel = document.createElement('div');
  panel.id = 'panel';

  // Header
  if (gi.title) {
    const hdr = document.createElement('div');
    hdr.id = 'panel-header';
    const art = document.createElement('img');
    art.id = 'game-box-art';
    if (gi.boxArt) { art.src = 'https://retroachievements.org' + gi.boxArt; art.style.display = 'block'; }
    const info = document.createElement('div');
    info.style.flex = '1';
    info.innerHTML = `<div id="game-title">${escHtml(gi.title)}</div><div id="game-progress">${gi.earned || 0} / ${gi.numAch || 0} achievements</div>` +
      (d.showRichPresence ? `<div id="game-rp">${escHtml(state.richPresence || '')}</div>` : '');
    hdr.appendChild(art);
    hdr.appendChild(info);
    panel.appendChild(hdr);
  }

  // Container
  const cont = document.createElement('div');
  cont.id = 'ach-container';
  const mode = d.mode || 'both';
  cont.className = 'mode-' + mode;

  // Sort achievements
  let list = [...achs].filter(a => !dismissed.has(a.id));
  const pinned = new Set(d.pinned || []);
  const orderMap = new Map((d.order || []).map((id, i) => [id, i]));
  list = list.filter(a => {
    if (d.filter === 'unearned') return !a.earned;
    if (d.filter === 'inprogress') return !a.earned && a.maxProgress > 0;
    return true;
  });
  list.sort((a, b) => {
    const ap = pinned.has(a.id) ? 0 : 1, bp = pinned.has(b.id) ? 0 : 1;
    if (ap !== bp) return ap - bp;
    const ao = orderMap.has(a.id) ? orderMap.get(a.id) : 9999;
    const bo = orderMap.has(b.id) ? orderMap.get(b.id) : 9999;
    return ao - bo;
  });

  if (!list.length) {
    const msg = document.createElement('div');
    msg.className = 'state-msg';
    msg.textContent = state.connected ? 'No achievements to display.' : 'Not connected';
    cont.appendChild(msg);
  } else if (mode === 'text') {
    for (const a of list) cont.appendChild(buildTextRow(a, d, pinned));
  } else {
    for (const a of list) {
      const tile = buildTile(a, d, pinned);
      cont.appendChild(tile);
    }
    // Sortable in both/tiles mode
    if (achSortable) { try { achSortable.destroy(); } catch {} achSortable = null; }
    resizeObservers.forEach(ro => ro.disconnect());
    resizeObservers = [];
    setTimeout(() => {
      achSortable = new Sortable(cont, {
        animation: 150,
        ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen',
        onEnd: () => {
          const ids = [...cont.querySelectorAll('.tile')].map(t => parseInt(t.dataset.id));
          fetch('/api/display', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order: ids }),
          }).catch(() => {});
        },
      });
      cont.querySelectorAll('.tile').forEach(tile => {
        const ro = new ResizeObserver(() => updateTileSizeClass(tile));
        ro.observe(tile);
        resizeObservers.push(ro);
        updateTileSizeClass(tile);
      });
    }, 0);
  }

  panel.appendChild(cont);
  aw.appendChild(panel);
  if (wasHidden || firstRender) animateIn(panel);

  // Resize handle — re-appended each render so it stays on top
  let rh = document.getElementById('ach-resize');
  if (!rh) {
    rh = document.createElement('div');
    rh.id = 'ach-resize';
    rh.className = 'resize-handle';
    rh.dataset.nodrag = '1';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const startX = e.clientX, startY = e.clientY;
      const startW = aw.offsetWidth || (state.display.panelWidth || 440);
      const startH = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--panel-h')) || (state.display.panelH || 600);
      document.body.style.userSelect = 'none'; document.body.style.cursor = 'nwse-resize';
      function onMove(e) {
        const nw = Math.max(200, startW + (e.clientX - startX));
        const nh = Math.max(150, startH + (e.clientY - startY));
        aw.style.width = nw + 'px';
        document.documentElement.style.setProperty('--panel-width', nw + 'px');
        document.documentElement.style.setProperty('--panel-h',     nh + 'px');
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.body.style.userSelect = ''; document.body.style.cursor = '';
        const w = Math.round(aw.offsetWidth);
        const h = Math.round(parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--panel-h')) || 600);
        state.display.panelWidth = w; state.display.panelH = h;
        fetch('/api/display/position', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({w,h}) }).catch(()=>{});
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp, { once: true });
    });
  }
  aw.appendChild(rh);

  // Recent panel
  renderRecentPanel(d, achs);
}

function buildTile(a, d, pinned) {
  const el = document.createElement('div');
  el.dataset.id = a.id;
  el.className  = 'tile' + (a.earned ? ' earned' : '') + (pinned.has(a.id) ? ' pinned' : '')
                + (flashIds.has(a.id) ? ' ach-flash' : '');

  // Dismiss button
  const dis = document.createElement('button');
  dis.className = 'dismiss-btn'; dis.textContent = '×'; dis.title = 'Dismiss';
  dis.dataset.nodrag = '1';
  dis.onclick = () => { dismissed.add(a.id); el.remove(); };
  el.appendChild(dis);

  // Badge
  const badgeWrap = document.createElement('div');
  badgeWrap.className = 'tile-badge';
  const img = document.createElement('img');
  img.src     = `${BADGE_BASE}/${a.badge}${a.earned ? '' : '_lock'}.png`;
  img.loading = 'lazy';
  img.alt     = '';
  if (!a.earned) img.className = 'locked';
  img.onerror = () => { img.style.opacity = '0.2'; };
  if (a.earned) {
    const chk = document.createElement('div');
    chk.className = 'badge-earned'; chk.textContent = '✓';
    badgeWrap.appendChild(chk);
  }
  badgeWrap.appendChild(img);
  el.appendChild(badgeWrap);

  // Content
  const content = document.createElement('div');
  content.className = 'tile-content';
  const hdr = document.createElement('div');
  hdr.className = 'tile-header';
  const name = document.createElement('div');
  name.className   = 'tile-name';
  name.textContent = a.title;
  hdr.appendChild(name);
  if (d.showPoints) {
    const pts = document.createElement('div');
    pts.className   = 'tile-points';
    pts.textContent = a.points + ' pts';
    hdr.appendChild(pts);
  }
  content.appendChild(hdr);
  if (d.showDesc && a.description) {
    const desc = document.createElement('div');
    desc.className   = 'tile-desc';
    desc.textContent = a.description;
    content.appendChild(desc);
  }
  if (a.maxProgress > 0 && !a.earned) {
    const pct = Math.min(100, Math.round(100 * a.userProgress / a.maxProgress));
    const pw = document.createElement('div');
    pw.className = 'progress-wrap';
    pw.innerHTML = `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-label">${a.userProgress} / ${a.maxProgress}</div>`;
    content.appendChild(pw);
  }
  if (a.earned && a.dateEarned) {
    const dt = document.createElement('div');
    dt.className   = 'tile-date';
    dt.textContent = formatDate(a.dateEarned);
    content.appendChild(dt);
  }
  el.appendChild(content);

  // Tiles mode expand hint
  const hint = document.createElement('span');
  hint.className = 'expand-hint'; hint.textContent = '⤢';
  el.appendChild(hint);

  // Tiles mode expand on click
  if ((d.mode || 'both') === 'tiles') {
    el.style.cursor = 'pointer';
    el.onclick = function(e) {
      if (e.target.classList.contains('dismiss-btn')) return;
      el.classList.toggle('expanded');
    };
  }

  return el;
}

function buildTextRow(a, d, pinned) {
  const el = document.createElement('div');
  el.dataset.id = a.id;
  el.className = 'tile-text' + (a.earned ? ' earned' : '') + (pinned.has(a.id) ? ' pinned' : '')
               + (flashIds.has(a.id) ? ' ach-flash' : '');
  const img = document.createElement('img');
  img.className = 'tile-text-badge' + (a.earned ? '' : ' locked');
  img.src = `${BADGE_BASE}/${a.badge}${a.earned ? '' : '_lock'}.png`;
  img.loading = 'lazy'; img.alt = '';
  img.onerror = () => { img.style.opacity = '0.2'; };
  const name = document.createElement('div');
  name.className = 'tile-text-name'; name.textContent = a.title;
  el.appendChild(img);
  el.appendChild(name);
  if (d.showPoints) {
    const pts = document.createElement('div');
    pts.className = 'tile-text-pts'; pts.textContent = a.points + 'p';
    el.appendChild(pts);
  }
  return el;
}

function updateTileSizeClass(tile) {
  const w = tile.offsetWidth, h = tile.offsetHeight;
  tile.classList.remove('sz-xs','sz-sm','sz-md','sz-lg','sz-xl');
  if (w < 100) tile.classList.add('sz-xs');
  else if (w < 160) tile.classList.add('sz-sm');
  else if (h < 72)  tile.classList.add('sz-md');
  else if (h < 110) tile.classList.add('sz-lg');
  else tile.classList.add('sz-xl');
}

function renderRecentPanel(d, achs) {
  const canvas = document.getElementById('canvas');
  let rp = document.getElementById('recent-panel');

  if (!d.recentEnabled) { if (rp) rp.style.display = 'none'; return; }

  if (!rp) {
    rp = document.createElement('div');
    rp.id = 'recent-panel';
    canvas.appendChild(rp);
    makeDraggable(rp, '/api/display/recent-position', (x, y) => {
      state.display.recentX = x; state.display.recentY = y;
    });
  }
  rp.style.display = '';

  // Position
  if (d.recentX !== null && d.recentX !== undefined) {
    rp.style.left = d.recentX + 'px'; rp.style.top = d.recentY + 'px';
    rp.style.bottom = ''; rp.style.right = ''; rp.style.transform = '';
  } else {
    rp.style.left = ''; rp.style.top = ''; rp.style.bottom = ''; rp.style.right = '';
  }
  if (d.recentW) rp.style.width  = d.recentW + 'px';
  if (d.recentH) rp.style.height = d.recentH + 'px';
  rp.style.zIndex = d.recentZIndex || 9;

  const mode   = d.recentMode || 'stack';
  const earned = achs.filter(a => a.earned && a.dateEarned)
    .sort((a,b) => b.dateEarned.localeCompare(a.dateEarned))
    .slice(0, d.recentCount || 3);
  const key = mode + ':' + earned.map(a => a.id).join(',');
  if (rp.dataset.key === key && (d.recentX === undefined || rp.style.left)) {
    // Still set class in case mode changed
    setRecentClass(rp, d, mode); return;
  }
  rp.dataset.key = key;

  // Clear content, preserve resize handle
  let rh = document.getElementById('recent-resize');
  Array.from(rp.children).forEach(c => { if (c !== rh) c.remove(); });

  setRecentClass(rp, d, mode);

  if (mode === 'ticker') {
    buildRecentTicker(rp, earned, d);
  } else {
    for (const a of earned) {
      const el = document.createElement('div');
      el.className = 'recent-tile';
      el.innerHTML = `<img class="recent-badge" src="${BADGE_BASE}/${a.badge}.png" loading="lazy" alt="">
        <div style="flex:1;min-width:0"><div class="recent-title">${escHtml(a.title)}</div><div class="recent-date">${formatDate(a.dateEarned)}</div></div>
        <div class="recent-pts">${a.points} pts</div>`;
      rp.appendChild(el);
    }
  }

  // Resize handle — always last child
  if (!rh) {
    rh = document.createElement('div');
    rh.id = 'recent-resize';
    rh.className = 'resize-handle';
    rh.dataset.nodrag = '1';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const startX = e.clientX, startY = e.clientY;
      const startW = rp.offsetWidth, startH = rp.offsetHeight;
      document.body.style.userSelect = 'none'; document.body.style.cursor = 'nwse-resize';
      function onMove(e) {
        rp.style.width  = Math.max(80,  startW + (e.clientX - startX)) + 'px';
        rp.style.height = Math.max(36, startH + (e.clientY - startY)) + 'px';
        // Recompute ticker duration live when resized
        const track = rp.querySelector('.recent-ticker-track');
        if (track) setTickerDuration(rp, track, d.recentSpeed);
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.body.style.userSelect = ''; document.body.style.cursor = '';
        const w = Math.round(rp.offsetWidth), h = Math.round(rp.offsetHeight);
        state.display.recentW = w; state.display.recentH = h;
        fetch('/api/display/recent-position', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({w,h}) }).catch(()=>{});
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp, { once: true });
    });
  }
  rp.appendChild(rh);
}

function setRecentClass(rp, d, mode) {
  if (d.recentX !== null && d.recentX !== undefined) {
    rp.className = mode === 'ticker' ? 'mode-ticker' : '';
  } else {
    rp.className = (mode === 'ticker' ? 'mode-ticker ' : '') + (d.recentPos || 'bottom-left');
  }
}

function buildRecentTicker(rp, earned, d) {
  const speed = d.recentSpeed || 80;
  const track = document.createElement('div');
  track.className = 'recent-ticker-track';

  // Build pills twice for seamless loop
  for (let pass = 0; pass < 2; pass++) {
    for (const a of earned) {
      const pill = document.createElement('div');
      pill.className = 'recent-pill';
      pill.innerHTML = `<img class="recent-pill-badge" src="${BADGE_BASE}/${a.badge}.png" loading="lazy" alt="">
        <span class="recent-pill-title">${escHtml(a.title)}</span>
        <span class="recent-pill-pts">+${a.points}pts</span>`;
      track.appendChild(pill);
    }
  }
  rp.insertBefore(track, rp.querySelector('.resize-handle'));

  // Set duration once layout is known
  requestAnimationFrame(() => setTickerDuration(rp, track, speed));
}

function setTickerDuration(rp, track, speed) {
  const halfW = track.scrollWidth / 2 || rp.offsetWidth;
  const dur = Math.max(3, halfW / (speed || 80));
  track.style.animationDuration = dur.toFixed(1) + 's';
}

function placeWidget(widget, animate) {
  const canvas = document.getElementById('canvas');
  document.getElementById('w-' + widget.id)?.remove();

  const el = document.createElement('div');
  el.id        = 'w-' + widget.id;
  el.className = 'widget' + (widget.locked ? ' locked' : '');
  el.style.cssText = `left:${widget.x}px;top:${widget.y}px;width:${widget.w}px;height:${widget.h}px;z-index:${widget.zIndex||1}`;

  switch (widget.type) {
    case 'death_counter':  el.appendChild(buildDeathCounter(widget)); break;
    case 'timer':          el.appendChild(buildTimer(widget));        break;
    case 'countdown':      el.appendChild(buildCountdown(widget));    break;
    case 'social':         el.appendChild(buildSocial(widget));       break;
    case 'scrolling_text': el.appendChild(buildScrollText(widget));   break;
    case 'image':          el.appendChild(buildImage(widget));        break;
    case 'chat':           el.appendChild(buildChat(widget));         break;
  }

  const endpoint = '/api/widgets/' + widget.id + '/position';
  if (!widget.locked) makeDraggable(el, endpoint);
  makeResizable(el, endpoint);
  canvas.appendChild(el);
  if (animate) animateIn(el);
}

function patchWidget(widget) {
  const el = document.getElementById('w-' + widget.id);
  if (!el) { if (widget.visible) placeWidget(widget, true); return; }
  if (!widget.visible) {
    if (el.style.display !== 'none') animateOut(el, () => { el.style.display = 'none'; });
    return;
  }
  if (el.style.display === 'none') { el.style.display = ''; animateIn(el); }
  el.style.display  = '';
  el.style.left     = widget.x + 'px';
  el.style.top      = widget.y + 'px';
  el.style.width    = widget.w + 'px';
  el.style.height   = widget.h + 'px';
  el.style.zIndex   = widget.zIndex || 1;
  // Update counter value without full rebuild
  const valEl = el.querySelector('[data-wval]');
  if (valEl) {
    if (widget.type === 'death_counter') valEl.textContent = widget.config.count ?? 0;
  }
}

function wBox(c) {
  const div = document.createElement('div');
  div.className = 'w-box';
  const [r,g,b] = hexToRgb(c.bgColor || '#0d0d0d');
  div.style.setProperty('--w-bg-rgb', `${r},${g},${b}`);
  div.style.setProperty('--w-bg-opacity', c.bgOpacity ?? 0.85);
  div.style.setProperty('--w-color', c.color || '#e6edf3');
  return div;
}

function buildDeathCounter(w) {
  const c = w.config, box = wBox(c);
  if (c.showLabel) { const l = document.createElement('div'); l.className = 'w-label'; l.textContent = c.label || 'Deaths'; l.dataset.nodrag = '1'; box.appendChild(l); }
  const v = document.createElement('div');
  v.className = 'w-value'; v.dataset.wval = '1';
  v.style.fontSize = (c.fontSize || 36) + 'px';
  v.textContent = c.count ?? 0;
  box.appendChild(v);
  return box;
}

function buildTimer(w) {
  const c = w.config, box = wBox(c);
  if (c.showLabel) { const l = document.createElement('div'); l.className = 'w-label'; l.textContent = c.label || 'Timer'; box.appendChild(l); }
  const v = document.createElement('div');
  v.className = 'w-value'; v.dataset.timerId = w.id; v.dataset.timerType = 'up';
  v.style.fontSize = (c.fontSize || 36) + 'px';
  v.textContent = formatMs(c.pausedElapsed || 0);
  box.appendChild(v);
  return box;
}

function buildCountdown(w) {
  const c = w.config, box = wBox(c);
  if (c.showLabel) { const l = document.createElement('div'); l.className = 'w-label'; l.textContent = c.label || 'Countdown'; box.appendChild(l); }
  const v = document.createElement('div');
  v.className = 'w-value'; v.dataset.timerId = w.id; v.dataset.timerType = 'down';
  v.style.fontSize = (c.fontSize || 36) + 'px';
  v.textContent = formatMs(Math.max(0, (c.totalMs || 0) - (c.pausedElapsed || 0)));
  box.appendChild(v);
  return box;
}

function buildSocial(w) {
  const c = w.config;
  const outer = document.createElement('div');
  outer.className = 'w-social';
  const [r,g,b] = hexToRgb(c.bgColor || '#0d0d0d');
  outer.style.setProperty('--w-bg-rgb', `${r},${g},${b}`);
  outer.style.setProperty('--w-bg-opacity', c.bgOpacity ?? 0.85);
  outer.style.setProperty('--w-color', c.color || '#e6edf3');
  if (c.showIcon && PLATFORM_ICONS[c.platform]) {
    const icon = document.createElement('div');
    icon.className = 'w-social-icon'; icon.innerHTML = PLATFORM_ICONS[c.platform];
    outer.appendChild(icon);
  }
  const text = document.createElement('div');
  text.className = 'w-social-text';
  text.style.fontSize = (c.fontSize || 18) + 'px';
  const h = (c.handle || '').replace(/^@/, '');
  const prefixes = { twitch:'twitch.tv/', youtube:'@', twitter:'@', instagram:'@', tiktok:'@', discord:'', default:'' };
  text.textContent = (prefixes[c.platform] ?? '') + h;
  outer.appendChild(text);
  return outer;
}

function buildScrollText(w) {
  const c = w.config;
  const outer = document.createElement('div');
  outer.className = 'w-scroll-outer';
  const [r,g,b] = hexToRgb(c.bgColor || '#0d0d0d');
  outer.style.setProperty('--w-bg-rgb', `${r},${g},${b}`);
  outer.style.setProperty('--w-bg-opacity', c.bgOpacity ?? 0);
  const dur = Math.max(3, Math.round(600 / (c.speed || 60))) + 's';
  outer.style.setProperty('--scroll-dur', dur);
  const inner = document.createElement('span');
  inner.className = 'w-scroll-inner';
  inner.style.fontSize = (c.fontSize || 22) + 'px';
  inner.style.color = c.color || '#e6edf3';
  inner.textContent = c.text || '';
  if (c.direction === 'right') inner.style.animationDirection = 'reverse';
  outer.appendChild(inner);
  return outer;
}

function buildChat(w) {
  const c = w.config;
  const outer = document.createElement('div');
  outer.className = 'chat-container';
  outer.dataset.chatWidget = w.id;
  const [r,g,b] = hexToRgb(c.bgColor || '#0d0d0d');
  outer.style.background = `rgba(${r},${g},${b},${c.bgOpacity ?? 0.75})`;
  outer.style.borderRadius = (c.borderRadius ?? 8) + 'px';

  if (c.showHeader) {
    const hdr = document.createElement('div');
    hdr.className = 'chat-header';
    hdr.textContent = c.headerText || 'Chat';
    outer.appendChild(hdr);
  }

  const list = document.createElement('div');
  list.className = 'chat-list';
  list.style.flexDirection = c.direction === 'top' ? 'column-reverse' : 'column';

  const empty = document.createElement('div');
  empty.className = 'chat-empty';
  empty.textContent = state.twitch?.connected
    ? 'Waiting for chat…'
    : 'Connect Twitch (Card 8 in setup) to display chat here.';
  list.appendChild(empty);

  outer.appendChild(list);
  return outer;
}

function appendChatMessage(msg) {
  document.querySelectorAll('[data-chat-widget]').forEach(container => {
    const wid    = container.dataset.chatWidget;
    const widget = state.widgets.find(w => w.id === wid);
    if (!widget || !widget.visible) return;
    const c = widget.config;

    if (c.filterCommands && msg.message.trim().startsWith('!')) return;

    // Remove placeholder
    container.querySelector('.chat-empty')?.remove();

    const list = container.querySelector('.chat-list');
    if (!list) return;

    const msgEl = document.createElement('div');
    msgEl.className = 'chat-msg';
    msgEl.style.fontSize = (c.fontSize || 14) + 'px';
    msgEl.style.color = c.color || '#e6edf3';

    // Badges
    if (c.showBadges && Object.keys(msg.badges || {}).length) {
      const badgeWrap = document.createElement('div');
      badgeWrap.className = 'chat-badges';
      const badgeOrder = ['broadcaster','moderator','vip','subscriber'];
      for (const key of badgeOrder) {
        if (msg.badges[key]) {
          const b = document.createElement('span');
          b.className = 'chat-badge ' + key;
          const labels = { broadcaster:'LIVE', moderator:'MOD', vip:'VIP', subscriber:'SUB' };
          b.textContent = labels[key] || key.toUpperCase();
          badgeWrap.appendChild(b);
        }
      }
      if (badgeWrap.children.length) msgEl.appendChild(badgeWrap);
    }

    // Username
    const nameEl = document.createElement('span');
    nameEl.className = 'chat-username';
    nameEl.style.fontSize = (c.usernameSize || c.fontSize || 14) + 'px';
    nameEl.style.color = c.usernameColors
      ? (msg.color || hashColor(msg.username))
      : (c.color || '#e6edf3');
    nameEl.textContent = msg.username;
    msgEl.appendChild(nameEl);

    const colon = document.createElement('span');
    colon.className = 'chat-colon'; colon.textContent = ':';
    msgEl.appendChild(colon);

    const text = document.createElement('span');
    text.className = 'chat-text'; text.textContent = msg.message;
    msgEl.appendChild(text);

    if (c.showTimestamp) {
      const t = document.createElement('span');
      t.className = 'chat-time';
      t.textContent = new Date(msg.timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
      msgEl.appendChild(t);
    }

    if (c.direction === 'top') {
      list.insertBefore(msgEl, list.firstChild);
    } else {
      list.appendChild(msgEl);
      list.scrollTop = list.scrollHeight;
    }

    // Max messages
    const max = c.maxMessages || 20;
    while (list.children.length > max) {
      (c.direction === 'top' ? list.lastChild : list.firstChild).remove();
    }

    // Timeout fade
    if (c.messageTimeout > 0) {
      setTimeout(() => {
        msgEl.style.transition = 'opacity 0.5s ease';
        msgEl.style.opacity = '0';
        setTimeout(() => msgEl.remove(), 520);
      }, c.messageTimeout * 1000);
    }
  });
}

function hashColor(name) {
  const palette = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#00d2d3','#1dd1a1','#ff9f43','#f368e0'];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return palette[Math.abs(h) % palette.length];
}

function buildImage(w) {
  const c = w.config;
  const outer = document.createElement('div');
  outer.className = 'w-image';
  outer.style.opacity = c.opacity ?? 1;
  if (c.src) {
    const img = document.createElement('img');
    img.src = c.src; img.alt = '';
    img.style.objectFit = c.objectFit || 'contain';
    outer.appendChild(img);
  }
  return outer;
}

// ── Drag ──────────────────────────────────────────────────────────────────────

function makeDraggable(el, endpoint, onUpdate) {
  el.addEventListener('mousedown', e => {
    if (e.target.closest('[data-nodrag]')) return;
    e.preventDefault();
    const rect = el.getBoundingClientRect();
    const ox = e.clientX - rect.left, oy = e.clientY - rect.top;
    el.style.cursor = 'grabbing';
    document.body.style.userSelect = 'none';

    function onMove(e) {
      const pr = el.parentElement.getBoundingClientRect();
      el.style.left = Math.max(0, e.clientX - pr.left - ox) + 'px';
      el.style.top  = Math.max(0, e.clientY - pr.top  - oy) + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      el.style.cursor = ''; document.body.style.userSelect = '';
      const x = Math.round(parseFloat(el.style.left) || 0);
      const y = Math.round(parseFloat(el.style.top)  || 0);
      if (onUpdate) onUpdate(x, y);
      fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({x,y}) }).catch(()=>{});
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp, { once: true });
  });
}

// ── Resize ────────────────────────────────────────────────────────────────────

function makeResizable(el, endpoint, minW = 80, minH = 40) {
  const handle = document.createElement('div');
  handle.className = 'resize-handle';
  handle.dataset.nodrag = '1';
  el.style.overflow = el.style.overflow || 'hidden';
  el.appendChild(handle);

  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    const startX = e.clientX, startY = e.clientY;
    const startW = el.offsetWidth, startH = el.offsetHeight;
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'nwse-resize';

    function onMove(e) {
      el.style.width  = Math.max(minW, startW + (e.clientX - startX)) + 'px';
      el.style.height = Math.max(minH, startH + (e.clientY - startY)) + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
      const w = Math.round(el.offsetWidth), h = Math.round(el.offsetHeight);
      fetch(endpoint, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ w, h }),
      }).catch(() => {});
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp, { once: true });
  });
}

// ── Timer RAF loop ────────────────────────────────────────────────────────────

function timerLoop() {
  const now = Date.now();
  document.querySelectorAll('[data-timer-id]').forEach(el => {
    const id = el.dataset.timerId;
    const widget = state.widgets.find(w => w.id === id);
    if (!widget) return;
    const c = widget.config;
    const elapsed = c.running ? (now - c.startedAt) + (c.pausedElapsed || 0) : (c.pausedElapsed || 0);
    el.textContent = el.dataset.timerType === 'up'
      ? formatMs(elapsed)
      : formatMs(Math.max(0, (c.totalMs || 0) - elapsed));
  });
  requestAnimationFrame(timerLoop);
}

function formatMs(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return h > 0 ? `${h}:${p2(m)}:${p2(sec)}` : `${p2(m)}:${p2(sec)}`;
}
function p2(n) { return String(n).padStart(2,'0'); }

// ── Fallback RA poll (WebSocket preferred) ────────────────────────────────────

setInterval(() => {
  if (ws && ws.readyState === 1) return;
  fetch('/api/state').then(r => r.json()).then(d => {
    if (d.achievements) state.achievements = d.achievements;
    if (d.gameInfo)     state.gameInfo     = d.gameInfo;
    if (d.display)      Object.assign(state.display, d.display);
    if (d.widgets)      state.widgets      = d.widgets;
    renderAll();
    document.getElementById('ticker').textContent = 'Updated ' + new Date().toLocaleTimeString();
  }).catch(() => {});
}, 30_000);

// ── Alerts ────────────────────────────────────────────────────────────────────
// The server owns the queue and timing; this just renders alert_play/alert_stop.
// Add ?mute=1 to the overlay URL for silent browser previews (avoids double
// audio when OBS and a preview tab are open at the same time).

const ALERT_MUTED = new URLSearchParams(location.search).has('mute');
let currentAlert = null; // { id, box, inner, audio, outAnim }

function playAlert(alert, resume) {
  removeAlertNow();
  const layer = document.getElementById('alert-layer');
  const box = document.createElement('div');
  box.className = 'alert-box';
  const pos = alert.position || {};
  if (pos.mode === 'custom') {
    box.style.left = (pos.x ?? 50) + '%';
    box.style.top  = (pos.y ?? 20) + '%';
    box.style.transform = 'translate(-50%,-50%)';
  } else {
    box.classList.add('pos-' + (pos.preset || 'center'));
  }

  const inner = document.createElement('div');
  const animIn = (alert.animation || {}).in || 'fade';
  inner.className = 'alert-inner' + (animIn !== 'none' && !resume ? ' anim-in-' + animIn : '');

  if (alert.image && alert.image.src) {
    const isVideo = /\.webm(\?|$)/i.test(alert.image.src);
    const el = document.createElement(isVideo ? 'video' : 'img');
    if (isVideo) { el.autoplay = true; el.loop = true; el.muted = true; }
    el.src = alert.image.src;
    el.style.width = (alert.image.widthPx || 300) + 'px';
    el.style.objectFit = alert.image.fit || 'contain';
    el.onerror = () => el.remove(); // a dead URL shouldn't leave a broken-image icon
    inner.appendChild(el);
  }

  if (alert.text && alert.text.text) {
    const t = document.createElement('div');
    t.className = 'alert-text';
    t.textContent = alert.text.text;
    t.style.fontSize = (alert.text.fontSize || 32) + 'px';
    t.style.color = alert.text.color || '#e6edf3';
    const [r,g,b] = hexToRgb(alert.text.bgColor || '#0d0d0d');
    t.style.background = `rgba(${r},${g},${b},${alert.text.bgOpacity ?? 0.85})`;
    if (alert.text.fontFamily) t.style.fontFamily = alert.text.fontFamily;
    inner.appendChild(t);
  }

  box.appendChild(inner);
  layer.appendChild(box);

  let audio = null;
  if (alert.audio && alert.audio.src && !ALERT_MUTED && !resume) {
    audio = new Audio(alert.audio.src);
    audio.volume = Math.max(0, Math.min(1, alert.audio.volume ?? 0.8));
    audio.play().catch(() => {}); // browsers may block autoplay; OBS does not
  }

  currentAlert = { id: alert.id, box, inner, audio, outAnim: (alert.animation || {}).out || 'fade' };
}

function stopAlert(alertId) {
  if (!currentAlert || (alertId && currentAlert.id !== alertId)) return;
  const { box, inner, audio, outAnim } = currentAlert;
  currentAlert = null;
  if (audio) { try { audio.pause(); } catch {} }
  if (outAnim === 'none') { box.remove(); return; }
  inner.className = 'alert-inner anim-out-' + outAnim;
  setTimeout(() => box.remove(), 450);
}

function removeAlertNow() {
  if (!currentAlert) return;
  if (currentAlert.audio) { try { currentAlert.audio.pause(); } catch {} }
  currentAlert.box.remove();
  currentAlert = null;
}

// ── Utility ────────────────────────────────────────────────────────────────────

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(s) { try { return new Date(s + 'Z').toLocaleString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); } catch { return s; } }

// ── Init ──────────────────────────────────────────────────────────────────────

connectWS();
requestAnimationFrame(timerLoop);
</script>
